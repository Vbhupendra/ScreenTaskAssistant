name: Build ScreenTaskAssistant

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable with PyInstaller
      run: |
        pyinstaller ScreenTaskAssistant.spec

    - name: Compress executable into standard ZIP
      shell: pwsh
      run: |
        Compress-Archive -Path dist/ScreenTaskAssistant.exe, USER_GUIDE.md -DestinationPath dist/ScreenTaskAssistant_Windows.zip

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScreenTaskAssistant-Windows-x64
        path: dist/ScreenTaskAssistant_Windows.zip
        if-no-files-found: error
